version: "3.8"

services:
  veil-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "8481:8481"
    volumes:
      - ./server.toml:/etc/veil/server.toml:ro
    environment:
      - RUST_LOG=veil_server=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8481/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s

  veil-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "8480:8480"
    command:
      - "--server-key"
      - "${VEIL_SERVER_PUBLIC_KEY}"
      - "--upstream"
      - "http://veil-server:8481"
      - "--listen"
      - "0.0.0.0:8480"
    depends_on:
      veil-server:
        condition: service_healthy
    restart: unless-stopped
